name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # NEXT_PUBLIC_* はビルド時に埋め込まれる。リポジトリの Secrets に同名で登録すること。
      - name: Check Firebase public env (must be non-empty)
        run: |
          for name in \
            NEXT_PUBLIC_FIREBASE_API_KEY \
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN \
            NEXT_PUBLIC_FIREBASE_PROJECT_ID \
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET \
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID \
            NEXT_PUBLIC_FIREBASE_APP_ID \
            NEXT_PUBLIC_ADSENSE_CLIENT_ID \
            NEXT_PUBLIC_ADSENSE_SLOT_EDITOR \
            NEXT_PUBLIC_GA_MEASUREMENT_ID
          do
            if [ -z "${!name}" ]; then
              echo "::error::$name is empty. Set all required vars in: Repository → Settings → Secrets and variables → Actions (names must match exactly, case-sensitive), then re-run this workflow or push to main."
              exit 1
            fi
          done
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_ADSENSE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_ADSENSE_CLIENT_ID }}
          NEXT_PUBLIC_ADSENSE_SLOT_EDITOR: ${{ secrets.NEXT_PUBLIC_ADSENSE_SLOT_EDITOR }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          # 任意: 未設定のままでもビルドは通る。設定すると本番でも管理者PINが使える。
          NEXT_PUBLIC_ADMIN_PIN_SHA256: ${{ secrets.NEXT_PUBLIC_ADMIN_PIN_SHA256 }}

      - name: Admin PIN hash available for build (no secret printed)
        run: |
          if [ -z "${NEXT_PUBLIC_ADMIN_PIN_SHA256}" ]; then
            echo "::warning::NEXT_PUBLIC_ADMIN_PIN_SHA256 is empty in this job. Admin PIN will not work on the deployed site. Add Repository secret NEXT_PUBLIC_ADMIN_PIN_SHA256 (64 hex chars, SHA-256 of PIN, no 0x prefix) and redeploy from main."
          else
            echo "::notice::NEXT_PUBLIC_ADMIN_PIN_SHA256 is set for the upcoming build (value not shown)."
          fi
        env:
          NEXT_PUBLIC_ADMIN_PIN_SHA256: ${{ secrets.NEXT_PUBLIC_ADMIN_PIN_SHA256 }}

      - run: npm ci && npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_ADSENSE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_ADSENSE_CLIENT_ID }}
          NEXT_PUBLIC_ADSENSE_SLOT_EDITOR: ${{ secrets.NEXT_PUBLIC_ADSENSE_SLOT_EDITOR }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          NEXT_PUBLIC_ADMIN_PIN_SHA256: ${{ secrets.NEXT_PUBLIC_ADMIN_PIN_SHA256 }}

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NOTE_PARK }}
          channelId: live
          projectId: note-park
